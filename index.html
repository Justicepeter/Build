<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h1 class="header-txt">How to design a form</h1>
    <p style="text-align: center; font-family: 'Courier New', Courier, monospace; font-size: 28px;font-weight: 400;">Registration Page</p>

    <form action="" method="">
       
        <div class="form-group">
            <label for="first-name">First Name</label><br>
            <input type="text" name="first-name" class="form-control" placeholder="Enter first name" required>
        </div>

       <div class="form-group">
            <label for="last-name">Last Name</label><br>
            <input type="text" name="last-name" class="form-control" placeholder="Enter last name" required>
       </div>
       
       <div class="form-group">
            <label for="email">Email</label><br>
            <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
      </div>

        <div class="form-group">
            <label for="password">Password</label><br>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
        </div>

        <div class="form-group">
            <label for="cpassword">Confirm Password</label><br>
            <input type="password" name="cpassword" class="form-control" placeholder="Enter confirm password" required>
       </div>

       <div class="form-group">
         <input type="submit" value="Submit">
        </div>
        <!-- <button type="button" name="submit">Submit</button> -->

        <p style="font-family: 'Courier New', Courier, monospace; font-size: 20px;">Already registered? <a href="login.html">Login</a></p>
       

    </form>

</body>
</html>
